<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Buddget — شاشة الترحيب (AR)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  /* Page chrome is only to centre the screen for review — NOT part of the design. */
  body { display: flex; align-items: center; justify-content: center; background: #1b1b20; font-family: 'IBM Plex Sans Arabic', 'DM Sans', sans-serif; }

  /* ── THE SCREEN ── full-bleed 390×844 in the app (no radius on device) ── */
  .screen {
    position: relative; width: 390px; height: 844px; overflow: hidden; color: #fff; direction: rtl;
    background: linear-gradient(180deg, #2c2c35, #222229);
    font-family: 'IBM Plex Sans Arabic', 'DM Sans', sans-serif;
  }

  @keyframes wmBreathe { 0%,100% { transform: translateX(-50%) scale(1); opacity:.7 } 50% { transform: translateX(-50%) scale(1.14); opacity:1 } }
  @keyframes rotHead3 { 0% { opacity:0; transform:translateY(14px) } 4% { opacity:1; transform:translateY(0) } 29% { opacity:1; transform:translateY(0) } 33% { opacity:0; transform:translateY(-14px) } 100% { opacity:0 } }

  .glow { position:absolute; top:-110px; left:50%; width:400px; height:400px; border-radius:50%;
    background: radial-gradient(circle, rgba(229,9,20,.28), transparent 68%); filter: blur(8px);
    animation: wmBreathe 8s ease-in-out infinite; z-index:1; }

  /* OS chrome — context only; the OS draws these. In Arabic the bar mirrors (time at right). */
  .island { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:108px; height:30px; background:#000; border-radius:16px; z-index:25; }
  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 26px 9px; color:#fff; z-index:20; }
  .statusbar .time { font-size:15px; font-weight:600; font-family:'DM Sans',sans-serif; }
  .statusbar .icons { display:flex; align-items:center; gap:7px; }

  .content { position:relative; z-index:10; height:100%; }
  .hero { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 36px; text-align:center; }
  /* Brand wordmark stays Latin / LTR even in an RTL layout. */
  .wordmark { direction:ltr; font-family:'DM Sans',sans-serif; font-size:60px; font-weight:800; letter-spacing:-2px; line-height:1; }
  .wordmark .accent { color:#E50914; }
  .greeting { margin-top:22px; font-size:18px; font-weight:400; color:rgba(255,255,255,.6); }
  .greeting strong { color:#fff; font-weight:600; }

  .ticker { position:absolute; left:36px; right:36px; bottom:70px; height:60px; text-align:center; }
  .ticker p { position:absolute; left:0; right:0; bottom:0; font-size:19px; font-weight:400; line-height:1.4;
    color:rgba(255,255,255,.78); animation: rotHead3 13.5s ease-in-out infinite; animation-fill-mode: backwards; }
  .ticker p .accent { font-weight:700; color:#E50914; }
  .ticker p:nth-child(1) { animation-delay: 0s; }
  .ticker p:nth-child(2) { animation-delay: 4.5s; }
  .ticker p:nth-child(3) { animation-delay: 9s; }
</style>
</head>
<body>
  <div class="screen">
    <div class="glow"></div>
    <div class="island"></div>
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"></rect><rect x="5" y="5" width="3" height="7" rx="1"></rect><rect x="10" y="2.5" width="3" height="9.5" rx="1"></rect><rect x="15" y="0" width="3" height="12" rx="1"></rect></svg>
        <svg width="17" height="13" viewBox="0 0 17 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.2C3.1 2.3 5.7 1.2 8.5 1.2S13.9 2.3 16 4.2"></path><path d="M3.6 6.9C4.9 5.7 6.6 5 8.5 5s3.6.7 4.9 1.9"></path><path d="M6 9.4c.7-.6 1.6-1 2.5-1s1.8.4 2.5 1"></path><circle cx="8.5" cy="11.4" r=".9" fill="currentColor" stroke="none"></circle></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.8" width="21" height="11.4" rx="3" stroke="currentColor" stroke-opacity=".5"></rect><rect x="2" y="2.3" width="18" height="8.4" rx="1.8" fill="currentColor"></rect><rect x="23" y="4.2" width="2" height="4.6" rx="1" fill="currentColor" fill-opacity=".5"></rect></svg>
      </span>
    </div>

    <div class="content">
      <div class="hero">
        <div class="wordmark">Bud<span class="accent">d</span>get</div>
        <p class="greeting"><span id="greet">مساء الخير</span>، <strong id="uname">ليلى</strong></p>
      </div>

      <div class="ticker">
        <p>تتبَّع أموالك <span class="accent">دون عناء.</span></p>
        <p>كل عملية شراء <span class="accent">تُرصَد</span> لحظة حدوثها.</p>
        <p><span class="accent">خصوصيتك</span> مصونة بالتصميم، دائمًا.</p>
      </div>
    </div>
  </div>

  <script>
    /* ── الترحيب حسب الوقت — يجب أن يكون فوريًا (راجع README §"Greeting"). ──
       حساب متزامن من ساعة الجهاز المحلية فقط. بدون شبكة وبدون انتظار. */
    (function () {
      var h = new Date().getHours();          // يعتمد تلقائيًا على المنطقة الزمنية للجهاز
      var greet = h < 12 ? 'صباح الخير' : 'مساء الخير';
      var g = document.getElementById('greet');
      if (g) g.textContent = greet;

      /* الاسم من ملف المستخدم المسجَّل المخزَّن محليًا — لا يُجلب هنا. */
      var name = 'ليلى';
      var n = document.getElementById('uname');
      if (n) n.textContent = name;
    })();
  </script>
</body>
</html>
