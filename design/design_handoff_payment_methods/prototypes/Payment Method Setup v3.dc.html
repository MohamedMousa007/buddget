<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../../_ds/buddget-design-system-3e84a07a-da79-472d-b487-07c93afa5f48/tokens/fonts.css">
  <link rel="stylesheet" href="../../_ds/buddget-design-system-3e84a07a-da79-472d-b487-07c93afa5f48/tokens/colors.css">
  <link rel="stylesheet" href="../../_ds/buddget-design-system-3e84a07a-da79-472d-b487-07c93afa5f48/tokens/typography.css">
  <link rel="stylesheet" href="../../_ds/buddget-design-system-3e84a07a-da79-472d-b487-07c93afa5f48/styles.css">
  <style>
    @keyframes s3Up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes s3Fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes s3Panel { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .s3-scroll::-webkit-scrollbar { display: none; } .s3-scroll { scrollbar-width: none; }
    .s3-root, .s3-root * { -webkit-tap-highlight-color: transparent; }
    .s3-root input:focus, .s3-root button:focus, .s3-root input:focus-visible, .s3-root button:focus-visible { outline: none; box-shadow: none; }
    .s3-root input::placeholder { color: #6E6E85; }
  </style>
</helmet>

<div class="s3-root" dir="{{ dir }}" style="position:relative;width:375px;height:812px;overflow:hidden;background:#0A0A0F;font-family:var(--font-sans);display:flex;flex-direction:column;">
  <!-- header -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:52px 18px 12px;flex:none;">
    <div style="font:700 20px var(--font-sans);letter-spacing:-0.01em;color:#fff;">{{ title }}</div>
    <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:#1A1A24;border-radius:11px;color:#9898B0;cursor:pointer;padding:9px;">{{ icX }}</button>
  </div>

  <div class="s3-scroll" style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    <!-- LIVE CARD PREVIEW -->
    <div style="display:flex;justify-content:center;margin:6px 0 16px;">
      <div style="{{ cardStyle }}">
        <div style="position:absolute;inset:0;border-radius:20px;background:radial-gradient(120% 90% at 85% 8%,rgba(255,255,255,.16),transparent 60%);pointer-events:none;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;position:relative;">
          <span style="{{ cardChipStyle }}">{{ cardChip }}</span>
          <span style="font:600 9px var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.82);">{{ cardType }}</span>
        </div>
        <div style="margin-top:auto;position:relative;text-align:start;">
          <div style="font:700 22px var(--font-sans);letter-spacing:-0.01em;color:{{ cardNameColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ cardName }}</div>
          <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:12px;">
            <div style="display:flex;align-items:center;gap:10px;"><span style="width:30px;height:22px;border-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,255,255,.45));flex:none;"></span><span style="font:600 15px var(--font-mono);letter-spacing:.16em;color:rgba(255,255,255,.92);">{{ cardTail }}</span></div>
            <span style="font:700 13px var(--font-mono);color:rgba(255,255,255,.85);">{{ cardCur }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- CARD COLOUR -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;padding:0 2px;">
      <span style="font:600 10px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:#6E6E85;flex:none;">{{ t.colour }}</span>
      <div class="s3-scroll" style="display:flex;gap:9px;overflow-x:auto;flex:1;">
        <sc-for list="{{ colourSwatches }}" as="sw" hint-placeholder-count="5"><button onClick="{{ sw.onSelect }}" style="{{ sw.style }}"></button></sc-for>
      </div>
    </div>

    <!-- POPULAR quick-fill -->
    <div style="display:flex;align-items:center;gap:8px;margin:0 2px 11px;">
      <span style="font:600 10px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:#6E6E85;">{{ popularLabel }}</span>
      <span style="font-size:13px;line-height:1;">{{ popularFlag }}</span>
    </div>
    <div class="s3-scroll" style="display:flex;gap:8px;overflow-x:auto;margin-bottom:22px;padding-bottom:2px;">
      <sc-for list="{{ popular }}" as="p" hint-placeholder-count="6">
        <button onClick="{{ p.onSelect }}" style="{{ p.style }}"><span style="{{ p.chipStyle }}">{{ p.chip }}</span><span style="font:600 12.5px var(--font-sans);color:#CFCFE0;white-space:nowrap;">{{ p.name }}</span></button>
      </sc-for>
    </div>

    <div style="display:flex;flex-direction:column;gap:11px;">
      <!-- PROVIDER dropdown -->
      <div style="{{ provWrap }}">
        <button onClick="{{ toggleProv }}" style="{{ rowStyle }}">
          <span style="display:flex;align-items:center;gap:11px;min-width:0;"><span style="{{ provBtnChipStyle }}">{{ provBtnChip }}</span><span style="text-align:start;min-width:0;"><span style="display:block;font:600 9px var(--font-sans);letter-spacing:.1em;text-transform:uppercase;color:#6E6E85;">{{ t.provider }}</span><span style="display:block;font:600 15px var(--font-sans);color:{{ provValColor }};margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ provValue }}</span></span></span>
          <span style="{{ provChev }}">{{ icChevD }}</span>
        </button>
        <sc-if value="{{ provOpen }}" hint-placeholder-val="{{ false }}">
          <div style="padding:2px 12px 14px;animation:s3Panel .16s ease;">
            <div style="position:relative;margin-bottom:10px;">
              <span style="position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9898B0;display:inline-flex;">{{ icSearch }}</span>
              <input value="{{ provSearch }}" onChange="{{ onProvSearch }}" placeholder="{{ t.searchProv }}" style="width:100%;height:42px;background:#0F0F16;border:1px solid #26262f;border-radius:11px;padding-inline-start:36px;padding-inline-end:12px;color:#fff;font:400 14px var(--font-sans);text-align:start;">
            </div>
            <div class="s3-scroll" style="display:flex;flex-direction:column;gap:2px;max-height:230px;overflow-y:auto;">
              <sc-for list="{{ provList }}" as="pl" hint-placeholder-count="6">
                <sc-if value="{{ pl.isHeader }}" hint-placeholder-val="{{ false }}"><div style="font:600 9px var(--font-sans);letter-spacing:.1em;text-transform:uppercase;color:#6E6E85;padding:9px 6px 4px;">{{ pl.label }}</div></sc-if>
                <sc-if value="{{ pl.isItem }}" hint-placeholder-val="{{ true }}"><button onClick="{{ pl.onSelect }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:8px;background:transparent;border:none;border-radius:10px;cursor:pointer;text-align:start;" style-hover="background:#1A1A24;"><span style="{{ pl.chipStyle }}">{{ pl.chip }}</span><span style="flex:1;min-width:0;"><span style="display:block;font:600 14px var(--font-sans);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ pl.name }}</span><span style="display:block;font:500 11px var(--font-sans);color:#8A8AA0;margin-top:1px;">{{ pl.sub }}</span></span><sc-if value="{{ pl.selected }}" hint-placeholder-val="{{ false }}"><span style="width:16px;height:16px;color:#E50914;display:inline-flex;">{{ icCheck }}</span></sc-if></button></sc-if>
              </sc-for>
            </div>
            <div style="border-top:1px solid #24242f;margin-top:8px;padding-top:10px;">
              <sc-if value="{{ customClosed }}" hint-placeholder-val="{{ true }}"><button onClick="{{ openCustom }}" style="display:flex;align-items:center;gap:9px;width:100%;height:44px;background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.28);border-radius:11px;color:#FF5C5C;font:600 13.5px var(--font-sans);cursor:pointer;padding:0 14px;"><span style="width:17px;height:17px;display:inline-flex;">{{ icPlus }}</span>{{ t.addCustom }}</button></sc-if>
              <sc-if value="{{ customOpenPanel }}" hint-placeholder-val="{{ false }}"><input value="{{ customVal }}" onChange="{{ onCustomVal }}" placeholder="{{ t.customPh }}" style="width:100%;height:46px;background:#0F0F16;border:1px solid #26262f;border-radius:11px;padding:0 14px;color:#fff;font:400 15px var(--font-sans);text-align:start;"></sc-if>
            </div>
          </div>
        </sc-if>
      </div>

      <!-- TYPE -->
      <div>
        <div style="font:600 10px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:#6E6E85;margin:0 2px 9px;">{{ t.type }}</div>
        <div class="s3-scroll" style="display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;">
          <sc-for list="{{ typeChips }}" as="tc" hint-placeholder-count="8"><button onClick="{{ tc.onSelect }}" style="{{ tc.style }}"><span style="width:15px;height:15px;display:inline-flex;">{{ tc.glyph }}</span>{{ tc.label }}</button></sc-for>
        </div>
      </div>

      <!-- IDENTIFIER -->
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin:0 2px 9px;"><div style="font:600 10px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:#6E6E85;">{{ t.identifier }}</div><div style="font:500 10px var(--font-sans);color:#8A8AA0;">{{ t.optional }}</div></div>
        <div style="display:flex;gap:8px;">
          <sc-for list="{{ identTabs }}" as="it" hint-placeholder-count="3"><button onClick="{{ it.onSelect }}" style="{{ it.style }}">{{ it.label }}</button></sc-for>
        </div>
        <sc-if value="{{ identLast4 }}" hint-placeholder-val="{{ false }}"><input value="{{ last4Val }}" onChange="{{ onLast4 }}" dir="ltr" inputmode="numeric" maxlength="4" placeholder="0000" style="{{ last4Style }}"></sc-if>
        <sc-if value="{{ identTag }}" hint-placeholder-val="{{ false }}"><input value="{{ tagVal }}" onChange="{{ onTag }}" maxlength="18" placeholder="{{ t.tagPh }}" style="width:100%;height:48px;margin-top:10px;background:#1A1A24;border:1px solid #2A2A38;border-radius:12px;padding:0 14px;color:#fff;font:400 15px var(--font-sans);text-align:start;"></sc-if>
      </div>

      <!-- CURRENCY dropdown (searchable, flags) -->
      <div style="{{ curWrap }}">
        <button onClick="{{ toggleCur }}" style="{{ rowStyle }}">
          <span style="display:flex;align-items:center;gap:11px;min-width:0;"><span style="font-size:22px;line-height:1;flex:none;">{{ curFlag }}</span><span style="text-align:start;"><span style="display:block;font:600 9px var(--font-sans);letter-spacing:.1em;text-transform:uppercase;color:#6E6E85;">{{ t.currency }}</span><span style="display:flex;align-items:center;gap:8px;margin-top:2px;"><span style="font:700 15px var(--font-mono);color:#fff;">{{ curCode }}</span><span style="font:500 13px var(--font-sans);color:#9898B0;">{{ curName }}</span></span></span></span>
          <span style="{{ curChev }}">{{ icChevD }}</span>
        </button>
        <sc-if value="{{ curOpen }}" hint-placeholder-val="{{ false }}">
          <div style="padding:2px 12px 14px;animation:s3Panel .16s ease;">
            <div style="position:relative;margin-bottom:10px;">
              <span style="position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9898B0;display:inline-flex;">{{ icSearch }}</span>
              <input value="{{ curSearch }}" onChange="{{ onCurSearch }}" placeholder="{{ t.searchCur }}" style="width:100%;height:42px;background:#0F0F16;border:1px solid #26262f;border-radius:11px;padding-inline-start:36px;padding-inline-end:12px;color:#fff;font:400 14px var(--font-sans);text-align:start;">
            </div>
            <div class="s3-scroll" style="display:flex;flex-direction:column;gap:2px;max-height:230px;overflow-y:auto;">
              <sc-for list="{{ curList }}" as="cl" hint-placeholder-count="6"><button onClick="{{ cl.onSelect }}" style="{{ cl.rowStyle }}"><span style="font-size:20px;line-height:1;flex:none;width:26px;text-align:center;">{{ cl.flag }}</span><span style="font:700 14px var(--font-mono);color:#fff;width:46px;text-align:start;">{{ cl.code }}</span><span style="flex:1;text-align:start;font:500 13px var(--font-sans);color:#8A8AA0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ cl.name }}</span><sc-if value="{{ cl.selected }}" hint-placeholder-val="{{ false }}"><span style="width:16px;height:16px;color:#E50914;display:inline-flex;">{{ icCheck }}</span></sc-if></button></sc-for>
            </div>
          </div>
        </sc-if>
      </div>

      <!-- DEFAULT -->
      <div style="display:flex;align-items:center;justify-content:space-between;background:#16161f;border:1px solid #24242f;border-radius:14px;padding:14px 16px;">
        <span style="text-align:start;"><span style="display:block;font:600 14px var(--font-sans);color:#CFCFE0;">{{ t.setDefault }}</span><span style="display:block;font:400 11.5px var(--font-sans);color:#8A8AA0;margin-top:2px;">{{ t.setDefaultSub }}</span></span>
        <button onClick="{{ toggleDef }}" style="{{ defTrack }}"><span style="{{ defKnob }}"></span></button>
      </div>
    </div>
  </div>

  <div style="flex:none;padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid #1c1c26;">
    <button style="{{ saveStyle }}">{{ saveLabel }}</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:375,&quot;height&quot;:812},&quot;country&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;EG&quot;,&quot;SA&quot;,&quot;AE&quot;],&quot;default&quot;:&quot;EG&quot;,&quot;tsType&quot;:&quot;'EG' | 'SA' | 'AE'&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;ar&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en' | 'ar'&quot;},&quot;providerIcon&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;glyph&quot;,&quot;initials&quot;],&quot;default&quot;:&quot;glyph&quot;,&quot;tsType&quot;:&quot;'glyph' | 'initials'&quot;,&quot;section&quot;:&quot;Tweaks&quot;},&quot;popularScope&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;user&quot;,&quot;all&quot;],&quot;default&quot;:&quot;user&quot;,&quot;tsType&quot;:&quot;'user' | 'all'&quot;,&quot;section&quot;:&quot;Tweaks&quot;},&quot;demo&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;empty&quot;,&quot;filled&quot;,&quot;providerOpen&quot;,&quot;currencyOpen&quot;,&quot;custom&quot;],&quot;default&quot;:&quot;empty&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {

  TYPES = [
    { v:'cash', l:'Cash', icon:'banknote', color:'#C9C9D4' },
    { v:'bank_account', l:'Bank account', icon:'landmark', color:'#22C55E' },
    { v:'debit_card', l:'Debit card', icon:'card', color:'#A855F7' },
    { v:'credit_card', l:'Credit card', icon:'card', color:'#3B82F6' },
    { v:'prepaid_card', l:'Prepaid card', icon:'ticket', color:'#2DD4BF' },
    { v:'wallet', l:'Wallet', icon:'wallet', color:'#FB923C' },
    { v:'bnpl', l:'BNPL', icon:'split', color:'#EC4899' },
    { v:'other', l:'Other', icon:'shapes', color:'#9CA3AF' },
  ];

  CAT = {
    cash:{name:'Cash',type:'cash',colors:['#5A5A66','#3A3A44']},
    instapay:{name:'InstaPay',type:'wallet',colors:['#12A594','#0C6E63'],country:'EG'}, vodafone:{name:'Vodafone Cash',type:'wallet',colors:['#E60000','#8A1520'],country:'EG'}, nbe:{name:'NBE',full:'National Bank of Egypt',type:'bank_account',colors:['#2E8B57','#1C5A38'],country:'EG'}, cib:{name:'CIB',full:'Commercial International Bank',type:'bank_account',colors:['#2E5AAC','#B23A6B'],country:'EG'}, meeza:{name:'Meeza',type:'prepaid_card',colors:['#C6A24E','#7A6428'],country:'EG'}, valu:{name:'valU',type:'bnpl',colors:['#F04E23','#8A2A12'],country:'EG'}, fawry:{name:'Fawry',type:'wallet',colors:['#E8A200','#1B4B8A'],country:'EG'}, telda:{name:'Telda',type:'wallet',colors:['#8B7BF0','#4A3FA0'],country:'EG'},

    enbd:{name:'Emirates NBD',type:'bank_account',colors:['#C8102E','#7A0A1C'],country:'AE'}, adcb:{name:'ADCB',full:'Abu Dhabi Commercial Bank',type:'bank_account',colors:['#C4405A','#7A2838'],country:'AE'}, fab:{name:'FAB',full:'First Abu Dhabi Bank',type:'bank_account',colors:['#0B2C5F','#3E6BA8'],country:'AE'}, careempay:{name:'Careem Pay',type:'wallet',colors:['#2E9E58','#1F6F3C'],country:'AE'}, eand:{name:'e& money',type:'wallet',colors:['#E30613','#8A0A10'],country:'AE'}, nol:{name:'Nol',type:'prepaid_card',colors:['#0E86C0','#005C82'],country:'AE'},
    applepay:{name:'Apple Pay',type:'wallet',colors:['#2E2E36','#5A5A66']}, visa:{name:'Visa card',type:'credit_card',colors:['#1A1F71','#4B4FA0']}, mastercard:{name:'Mastercard',type:'credit_card',colors:['#CF1F2E','#EB621D']}, amex:{name:'Amex',full:'American Express',type:'credit_card',colors:['#2E77BC','#1A4A7A']}, paypal:{name:'PayPal',type:'wallet',colors:['#003087','#009CDE']}, wise:{name:'Wise',type:'wallet',colors:['#37517E','#163300']}, payoneer:{name:'Payoneer',type:'wallet',colors:['#FF4800','#B23200']},

  };

  country(){ const c=(this.props||{}).country; return this.QUICK[c]?c:'EG'; }
  useInitials(){ return (this.props||{}).providerIcon==='initials'; }
  ico(name){ const svg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%" style="display:block">'+(this.ICONS[name]||'')+'</svg>'; return React.createElement('span',{style:{display:'inline-flex',width:'100%',height:'100%'},dangerouslySetInnerHTML:{__html:svg}}); }
  rgba(hex,a){ const h=hex.replace('#',''); return 'rgba('+parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16)+','+a+')'; }
  shade(hex,f){ const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); const m=v=>Math.max(0,Math.min(255,Math.round(v*f))); return 'rgb('+m(r)+','+m(g)+','+m(b)+')'; }
  tMeta(v){ return this.TYPES.find(x=>x.v===v)||this.TYPES[7]; }
  initials(name){ const s=(name||'').replace(/[^a-z]/gi,''); return (s.slice(0,3)||'—').toUpperCase(); }
  allowLast4(v){ return ['credit_card','debit_card','prepaid_card','bank_account'].indexOf(v)!==-1; }
  brandColor(b){ return b&&b.colors?b.colors[0]:this.tMeta(this.state?this.state.type:'other').color; }

  // provider chip element (glyph OR initials), for a given brand/color
  chipEl(color, iconName, name, txtSize){
    if(this.useInitials()) return React.createElement('span',{style:{font:(txtSize||11)+'px/1 var(--font-sans)',fontWeight:800,letterSpacing:'.02em',color:color}}, this.initials(name));
    return this.ico(iconName);
  }

  preset(demo){
    const country=this.country();
    const cur = country==='SA'?'SAR':country==='AE'?'AED':'EGP';
    const base={ open:null, provider:null, providerName:'', type:'other', disc:'none', last4:'', tag:'', curCode:cur, def:false, cardColor:null, provSearch:'', curSearch:'', customOpen:false, customVal:'' };
    if(demo==='filled') return { ...base, provider:'cib', providerName:'CIB', type:'bank_account', disc:'last4', last4:'2016' };
    if(demo==='providerOpen') return { ...base, open:'provider' };
    if(demo==='currencyOpen') return { ...base, open:'currency', provider:'mada', providerName:'mada', type:'debit_card', disc:'last4', last4:'7781', curCode:'SAR' };
    if(demo==='custom') return { ...base, provider:'__custom', providerName:'Neighbourhood co-op', type:'other', open:'provider', customOpen:true, customVal:'Neighbourhood co-op' };
    return base;
  }
  state = this.preset((this.props||{}).demo);

  set(id){ this.setState(s=>({ open: s.open===id?null:id })); }
  pickBrand(id){ const b=this.CAT[id]; const cur = id==='nol'?'AED':(b.country==='SA'?'SAR':b.country==='AE'?'AED':this.state.curCode); this.setState({ provider:id, providerName:b.name, type:b.type, disc:this.allowLast4(b.type)?(b.type==='prepaid_card'?'none':'last4'):(b.type==='cash'?'none':'tag'), cardColor:null, open:null, customOpen:false, curCode:cur }); }
  setType(v){ const patch={ type:v }; if(this.state.disc==='last4'&&!this.allowLast4(v)) patch.disc='tag'; this.setState(patch); }
  setColor(c){ this.setState({ cardColor:c }); }
  openCustom(){ this.setState({ customOpen:true, provider:'__custom' }); }
  setCustom(v){ this.setState({ customVal:v, providerName:v, provider:'__custom', type:this.state.type }); }
  setDisc(k){ this.setState({ disc:k }); }
  setLast4(v){ if(/^[0-9]{0,4}$/.test(v)) this.setState({ last4:v }); }
  canSave(){ if(!this.state.providerName.trim()) return false; if(this.state.disc==='last4'&&this.state.last4.length!==0&&this.state.last4.length!==4) return false; return true; }

  renderVals(){
    const s=this.state, dir=(this.props||{}).lang==='ar'?'rtl':'ltr';
    const t={ title:'Add payment method', colour:'Colour', provider:'Provider', searchProv:'Search banks, wallets, cards…', addCustom:'Add a custom provider', customPh:'Custom provider name', type:'Type', identifier:'Identifier', optional:'optional', tagPh:'e.g. Personal, Salary, Gold', currency:'Currency', searchCur:'Search currency…', setDefault:'Set as default', setDefaultSub:'Use for new expenses', save:'Save method' };
    const country=this.country();
    const brand = s.provider&&s.provider!=='__custom'?this.CAT[s.provider]:null;
    const tMeta = this.tMeta(s.type);
    const cardColor = s.cardColor || (brand?brand.colors[0]:'#26263a');
    const hasProvider = !!s.providerName.trim();

    // card
    const grad='linear-gradient(140deg,'+this.shade(cardColor,1.18)+' 0%,'+cardColor+' 48%,'+this.shade(cardColor,0.6)+' 100%)';
    const cardStyle='position:relative;width:260px;height:164px;border-radius:20px;padding:18px 20px;display:flex;flex-direction:column;background:'+(hasProvider?grad:'#161620')+';border:'+(hasProvider?'none':'1px dashed #33333f')+';box-shadow:'+(hasProvider?('0 20px 44px -16px '+this.shade(cardColor,0.5)):'none')+';overflow:hidden;';
    const cardChip = hasProvider ? (this.useInitials()? React.createElement('span',{style:{font:'800 12px/1 var(--font-sans)',color:'#fff',letterSpacing:'.02em'}}, this.initials(s.providerName)) : this.ico(tMeta.icon)) : this.ico('plus');
    const cardChipStyle='width:42px;height:32px;border-radius:8px;background:rgba(255,255,255,'+(hasProvider?'.2':'.06')+');display:flex;align-items:center;justify-content:center;color:#fff;flex:none;'+(this.useInitials()?'':'padding:6px;');
    const cardTail = s.disc==='last4' ? (s.last4? '••••  '+s.last4 : '••••  ••••') : (s.type==='cash'?'CASH':'——  ——');

    // colour swatches
    const swColors = (brand? [brand.colors[0], brand.colors[1]] : []).concat(this.NEUTRALS);
    const seen={}; const swUnique = swColors.filter(c=>{ if(seen[c])return false; seen[c]=1; return true; });
    const colourSwatches = swUnique.map(c=>{ const active=(s.cardColor||(brand?brand.colors[0]:null))===c; return { onSelect:()=>this.setColor(c), style:'width:30px;height:30px;flex:none;border-radius:9px;cursor:pointer;background:'+c+';border:2px solid '+(active?'#fff':'transparent')+';box-shadow:0 0 0 1px rgba(255,255,255,.12);' }; });

    // popular
    const scope=(this.props||{}).popularScope==='all'?'all':'user';
    const popIds = scope==='all'? this.BLEND : this.QUICK[country];
    const chipMini=(b,color)=>this.useInitials()? React.createElement('span',{style:{font:'800 10px/1 var(--font-sans)',color:color}}, this.initials(b.name)) : this.ico(this.tMeta(b.type).icon);
    const popular = popIds.map(id=>{ const b=this.CAT[id]; const col=b.colors[0]; const sel=s.provider===id; return { name: id==='cash'?'Cash':b.name, chip:chipMini(b,col), chipStyle:'width:28px;height:28px;flex:none;border-radius:8px;background:'+this.rgba(col,.18)+';display:flex;align-items:center;justify-content:center;color:'+col+';'+(this.useInitials()?'':'padding:6px;'), onSelect:()=>this.pickBrand(id), style:'display:flex;align-items:center;gap:9px;flex:none;height:44px;padding:0 14px 0 8px;border-radius:999px;cursor:pointer;background:'+(sel?this.rgba(col,.16):'#1A1A24')+';border:1px solid '+(sel?this.rgba(col,.5):'#2A2A38')+';' }; });
    const popularLabel = scope==='all'? 'Popular' : ('Popular in '+(country==='EG'?'Egypt':country==='SA'?'Saudi':'UAE'));
    const popularFlag = scope==='all'? '' : (country==='EG'?'🇪🇬':country==='SA'?'🇸🇦':'🇦🇪');

    // provider dropdown
    const rowStyle='display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:none;padding:13px 15px;cursor:pointer;';
    const wrap=(open)=>'background:#16161f;border:1px solid '+(open?'#3a3a46':'#24242f')+';border-radius:14px;overflow:hidden;transition:border-color .15s;';
    const chev=(open)=>'width:20px;height:20px;flex:none;color:#9898B0;display:inline-flex;transition:transform .2s;transform:rotate('+(open?'180deg':'0')+');';
    const provBtnColor = brand?brand.colors[0]:tMeta.color;
    const provBtnChip = hasProvider ? (this.useInitials()? React.createElement('span',{style:{font:'800 12px/1 var(--font-sans)',color:provBtnColor}}, this.initials(s.providerName)) : this.ico(brand?this.tMeta(brand.type).icon:tMeta.icon)) : this.ico('search');
    const provBtnChipStyle='width:36px;height:36px;flex:none;border-radius:10px;background:'+this.rgba(hasProvider?provBtnColor:'#4A4A58',.16)+';display:flex;align-items:center;justify-content:center;color:'+(hasProvider?provBtnColor:'#9898B0')+';'+(this.useInitials()&&hasProvider?'':'padding:9px;');

    const q=s.provSearch.trim().toLowerCase();
    const provItem=(id)=>{ const b=this.CAT[id]; const col=b.colors[0]; return { isItem:true, name:b.name, sub:this.tMeta(b.type).l+(b.full?' · '+b.full:''), chip:chipMini(b,col), chipStyle:'width:34px;height:34px;flex:none;border-radius:9px;background:'+this.rgba(col,.16)+';display:flex;align-items:center;justify-content:center;color:'+col+';'+(this.useInitials()?'':'padding:8px;'), selected:s.provider===id, onSelect:()=>this.pickBrand(id) }; };
    let provList=[];
    if(q){ Object.keys(this.CAT).forEach(id=>{ if((this.CAT[id].name+' '+(this.CAT[id].full||'')).toLowerCase().indexOf(q)!==-1) provList.push(provItem(id)); }); }
    else { provList.push({isHeader:true,label:popularLabel}); popIds.forEach(id=>provList.push(provItem(id))); provList.push({isHeader:true,label:'All providers'}); Object.keys(this.CAT).filter(id=>popIds.indexOf(id)===-1).forEach(id=>provList.push(provItem(id))); }

    // type chips
    const typeChips=this.TYPES.map(tp=>{ const active=s.type===tp.v; return { label:tp.l, glyph:this.ico(tp.icon), onSelect:()=>this.setType(tp.v), style:'display:flex;align-items:center;gap:7px;flex:none;height:38px;padding:0 14px;border-radius:999px;font:600 13px var(--font-sans);cursor:pointer;white-space:nowrap;background:'+(active?this.rgba(tp.color,.15):'#1A1A24')+';border:1px solid '+(active?this.rgba(tp.color,.5):'#2A2A38')+';color:'+(active?tp.color:'#9898B0')+';' }; });

    // identifier
    const segKeys=this.allowLast4(s.type)?['last4','tag','none']:['tag','none'];
    const segLbl={last4:'Last 4',tag:'Label',none:'None'};
    const identTabs=segKeys.map(k=>({ label:segLbl[k], onSelect:()=>this.setDisc(k), style:'flex:1;height:42px;border-radius:12px;border:1px solid '+(s.disc===k?'#E50914':'#2A2A38')+';background:'+(s.disc===k?'#E50914':'#1A1A24')+';color:'+(s.disc===k?'#fff':'#CFCFE0')+';font:600 13px var(--font-sans);cursor:pointer;' }));
    const last4Style='width:100%;height:48px;margin-top:10px;background:#1A1A24;border:1px solid #2A2A38;border-radius:12px;padding:0 14px;color:#fff;font:500 17px var(--font-mono);letter-spacing:.32em;text-align:start;';

    // currency
    const cq=s.curSearch.trim().toLowerCase();
    const curList=this.CURRENCIES.filter(c=>!cq||c.toLowerCase().indexOf(cq)!==-1||this.CUR_NAMES[c].toLowerCase().indexOf(cq)!==-1).map(c=>({ code:c, name:this.CUR_NAMES[c], flag:this.CUR_FLAG[c], selected:c===s.curCode, onSelect:()=>this.setState({curCode:c,open:null,curSearch:''}), rowStyle:'display:flex;align-items:center;gap:10px;width:100%;height:46px;padding:0 8px;background:'+(c===s.curCode?'#1A1A24':'transparent')+';border:none;border-radius:10px;cursor:pointer;' }));

    const canSave=this.canSave();

    return {
      dir, t, title:t.title, saveLabel:t.save,
      icX:this.ico('x'), icChevD:this.ico('chevD'), icSearch:this.ico('search'), icPlus:this.ico('plus'), icCheck:this.ico('check'),
      // card
      cardStyle, cardChip, cardChipStyle, cardType: hasProvider? tMeta.l : 'New method', cardName: hasProvider? s.providerName : 'Add a method', cardNameColor: hasProvider?'#fff':'rgba(255,255,255,.45)', cardTail, cardCur:s.curCode,
      // colour
      colourSwatches,
      // popular
      popular, popularLabel, popularFlag,
      // provider
      rowStyle, provWrap:wrap(s.open==='provider'), toggleProv:()=>this.set('provider'), provOpen:s.open==='provider', provChev:chev(s.open==='provider'),
      provBtnChip, provBtnChipStyle, provValue: hasProvider? s.providerName : 'Choose or search', provValColor: hasProvider?'#fff':'#9898B0',
      provSearch:s.provSearch, onProvSearch:e=>this.setState({provSearch:e.target.value}), provList,
      customClosed:!s.customOpen, customOpenPanel:s.customOpen, openCustom:()=>this.openCustom(), customVal:s.customVal, onCustomVal:e=>this.setCustom(e.target.value),
      // type
      typeChips,
      // identifier
      identTabs, identLast4:s.disc==='last4', identTag:s.disc==='tag', last4Val:s.last4, onLast4:e=>this.setLast4(e.target.value), last4Style, tagVal:s.tag, onTag:e=>this.setState({tag:e.target.value}),
      // currency
      curWrap:wrap(s.open==='currency'), toggleCur:()=>this.set('currency'), curOpen:s.open==='currency', curChev:chev(s.open==='currency'), curFlag:this.CUR_FLAG[s.curCode], curCode:s.curCode, curName:this.CUR_NAMES[s.curCode], curSearch:s.curSearch, onCurSearch:e=>this.setState({curSearch:e.target.value}), curList,
      // default + save
      toggleDef:()=>this.setState({def:!s.def}), defTrack:'width:46px;height:28px;flex:none;border:none;border-radius:999px;cursor:pointer;padding:3px;display:flex;justify-content:'+(s.def?'flex-end':'flex-start')+';background:'+(s.def?'#E50914':'#2A2A38')+';transition:background .16s;', defKnob:'width:22px;height:22px;border-radius:999px;background:#fff;display:block;',
      saveStyle:'width:100%;height:52px;border:none;border-radius:14px;font:600 16px var(--font-sans);cursor:'+(canSave?'pointer':'not-allowed')+';background:'+(canSave?'#E50914':'#1A1A24')+';color:'+(canSave?'#fff':'#6E6E85')+';',
    };
  }
}
</script>
