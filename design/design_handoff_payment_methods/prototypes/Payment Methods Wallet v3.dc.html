<x-dc>

  <link rel="stylesheet" href="../../_ds/buddget-design-system-3e84a07a-da79-472d-b487-07c93afa5f48/tokens/colors.css">

<div class="w3-root" dir="{{ dir }}" style="position:relative;width:375px;height:812px;overflow:hidden;background:#0A0A0F;font-family:var(--font-sans);color:#fff;display:flex;flex-direction:column;">

    <span style="font:600 15px var(--font-sans);color:#fff;">9:41</span>
    <span style="display:flex;align-items:center;gap:6px;color:#fff;"><span style="width:17px;height:11px;display:inline-flex;">{{ icSignal }}</span><span style="width:16px;height:11px;display:inline-flex;">{{ icWifi }}</span><span style="width:24px;height:12px;display:inline-flex;">{{ icBattery }}</span></span>
  </div>
  <!-- header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 16px 10px;flex:none;">
    <div style="display:flex;align-items:center;gap:12px;min-width:0;">

      <div style="font:700 20px var(--font-sans);letter-spacing:-0.01em;">{{ t.title }}</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;background:#1A1A24;border:1px solid #2A2A38;border-radius:10px;padding:4px;">
      <button onClick="{{ setCarousel }}" style="{{ tabCarousel }}">{{ icCards }}</button>
      <button onClick="{{ setList }}" style="{{ tabList }}">{{ icList }}</button>
    </div>
  </div>

  <div class="w3-scroll" style="flex:1;overflow-y:auto;">
    <!-- CAROUSEL VIEW -->
    <sc-if value="{{ isCarousel }}" hint-placeholder-val="{{ true }}">

        <sc-for list="{{ deck }}" as="k" hint-placeholder-count="4">

            <sc-if value="{{ k.isAdd }}" hint-placeholder-val="{{ false }}">
              <button onClick="{{ k.onTap }}" style="{{ k.addStyle }}"><span style="width:44px;height:44px;border-radius:999px;background:rgba(229,9,20,.12);display:flex;align-items:center;justify-content:center;color:#FF5C5C;"><span style="width:22px;height:22px;display:inline-flex;">{{ icPlus }}</span></span><span style="font:600 14px var(--font-sans);color:#CFCFE0;">{{ t.addCard }}</span></button>

            <sc-if value="{{ k.isCard }}" hint-placeholder-val="{{ true }}">

                <div style="display:flex;align-items:center;justify-content:space-between;position:relative;">
                  <span style="{{ k.chipStyle }}">{{ k.chip }}</span>
                  <sc-if value="{{ k.isDefault }}" hint-placeholder-val="{{ false }}"><span style="font:700 8.5px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.22);border-radius:999px;padding:3px 8px;">{{ t.default }}</span></sc-if>
                </div>
                <div style="margin-top:auto;position:relative;text-align:start;">
                  <div style="font:700 20px var(--font-sans);letter-spacing:-0.01em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ k.name }}</div>
                  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:10px;"><span style="font:600 13px var(--font-mono);letter-spacing:.14em;color:rgba(255,255,255,.9);">{{ k.tail }}</span><span style="font:700 12px var(--font-mono);color:rgba(255,255,255,.82);">{{ k.cur }}</span></div>
                </div>
              </button>
            </sc-if>
          </div>
        </sc-for>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;"><sc-for list="{{ dots }}" as="d" hint-placeholder-count="4"><span style="{{ d.style }}"></span></sc-for></div>

      <!-- focused actions -->
      <sc-if value="{{ focusIsCard }}" hint-placeholder-val="{{ true }}">
        <div style="margin:22px 18px 0;padding:16px 18px;background:#111118;border:1px solid #24242f;border-radius:16px;animation:w3Fade .2s ease;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <div style="min-width:0;"><div style="font:600 16px var(--font-sans);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ focusName }}</div><div style="font:500 12.5px var(--font-sans);color:#9898B0;margin-top:3px;">{{ focusSub }}</div></div>

        </div>

      <div style="height:24px;"></div>

                      <span style="{{ m.chipStyle }}">{{ m.chip }}</span>

                      <button onClick="{{ m.onMenu }}" style="width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#9898B0;cursor:pointer;padding:7px;">{{ icDots }}</button>
                    </div>
                    <sc-if value="{{ m.menuOpen }}" hint-placeholder-val="{{ false }}">
                      <div style="position:absolute;top:50px;inset-inline-end:12px;z-index:5;width:184px;background:#15151f;border:1px solid #2A2A38;border-radius:13px;overflow:hidden;box-shadow:0 18px 40px -12px rgba(0,0,0,.6);animation:w3Pop .14s ease;">
                        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;color:#CFCFE0;font:500 14px var(--font-sans);"><span style="width:16px;height:16px;display:inline-flex;">{{ icPencil }}</span>{{ t.edit }}</div>
                        <div style="height:1px;background:#2A2A38;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;color:#CFCFE0;font:500 14px var(--font-sans);"><span style="width:16px;height:16px;display:inline-flex;color:#38D96B;">{{ icStar }}</span>{{ t.setDefault }}</div>
                        <div style="height:1px;background:#2A2A38;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;color:#FF6B6B;font:500 14px var(--font-sans);"><span style="width:16px;height:16px;display:inline-flex;">{{ icTrash }}</span>{{ t.delete }}</div>
                      </div>
                    </sc-if>
                    <sc-if value="{{ m.divider }}" hint-placeholder-val="{{ true }}"><div style="height:1px;background:#24242f;margin-inline-start:60px;"></div></sc-if>
                  </div>
                </sc-for>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>
  </div>

  <!-- carousel bottom add -->
  <sc-if value="{{ isCarousel }}" hint-placeholder-val="{{ true }}">
    <div style="flex:none;padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid #1c1c26;">
      <button style="display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:52px;background:#E50914;border:none;border-radius:14px;color:#fff;font:600 16px var(--font-sans);cursor:pointer;"><span style="width:19px;height:19px;display:inline-flex;">{{ icPlus }}</span>{{ t.addCta }}</button>
    </div>
  </sc-if>

  <div style="position:absolute;left:50%;transform:translateX(-50%);bottom:9px;width:134px;height:5px;border-radius:999px;background:#fff;opacity:.3;"></div>
</div>
</x-dc>

  isAr(){ return (this.props||{}).lang==='ar'; }
  useInitials(){ return (this.props||{}).providerIcon==='initials'; }
  ico(name){ const svg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%" style="display:block">'+(this.ICONS[name]||'')+'</svg>'; return React.createElement('span',{style:{display:'inline-flex',width:'100%',height:'100%'},dangerouslySetInnerHTML:{__html:svg}}); }

  shade(hex,f){ const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); const m=v=>Math.max(0,Math.min(255,Math.round(v*f))); return 'rgb('+m(r)+','+m(g)+','+m(b)+')'; }

  composed(m){ if(m.last4) return m.provider+'  ••••'+m.last4; if(m.tag) return m.provider+'  ·  '+m.tag; return m.provider; }

  methods(){ return (this.props||{}).variant==='empty' ? this.METHODS.filter(m=>m.type==='cash') : this.METHODS; }

      const tx=off*130, scale=isActive?1:0.82, op=hidden?0:(isActive?1:0.4);
      const grad='linear-gradient(140deg,'+this.shade(m.color,1.18)+' 0%,'+m.color+' 48%,'+this.shade(m.color,0.6)+' 100%)';
      return { isCard:true, isAdd:false, wrapStyle:'position:absolute;left:50%;top:6px;width:'+CARD_W+'px;height:'+CARD_H+'px;margin-inline-start:-'+(CARD_W/2)+'px;transform:translateX('+tx+'px) scale('+scale+');opacity:'+op+';z-index:'+(20-Math.abs(off))+';transition:transform .38s cubic-bezier(.22,1,.36,1),opacity .3s;pointer-events:'+(hidden?'none':'auto')+';',
        cardStyle:'position:relative;width:100%;height:100%;display:flex;flex-direction:column;background:'+grad+';border:none;border-radius:20px;padding:16px 18px;cursor:pointer;box-shadow:0 18px 40px -14px '+this.shade(m.color,0.5)+',inset 0 1px 0 rgba(255,255,255,.16);text-align:start;',
        chip:this.chipEl('#fff',m.type,m.provider,12), chipStyle:'width:40px;height:30px;border-radius:7px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:#fff;flex:none;'+(this.useInitials()?'':'padding:6px;'),
        isDefault:!!m.isDefault, name:m.provider, tail: m.last4?('•••• '+m.last4):(m.type==='cash'?'CASH':(m.tag||'—')), cur:m.cur, onTap:()=>this.go(i) };
    });
    deck.push({ isAdd:true, isCard:false, wrapStyle:'position:absolute;left:50%;top:6px;width:'+CARD_W+'px;height:'+CARD_H+'px;margin-inline-start:-'+(CARD_W/2)+'px;transform:translateX('+((list.length-this.state.active)*130)+'px) scale('+(this.state.active===list.length?1:0.82)+');opacity:'+(Math.abs(list.length-this.state.active)>2?0:(this.state.active===list.length?1:0.4))+';z-index:'+(20-Math.abs(list.length-this.state.active))+';transition:transform .38s cubic-bezier(.22,1,.36,1),opacity .3s;',
      addStyle:'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#141420;border:1.5px dashed #33333f;border-radius:20px;cursor:pointer;', onTap:()=>this.go(list.length) });

    const dots=[]; for(let i=0;i<total;i++) dots.push({ style:'width:'+(i===this.state.active?'18px':'6px')+';height:6px;border-radius:999px;background:'+(i===this.state.active?'#E50914':'#2A2A38')+';transition:all .25s;' });

    const focus=this.state.active<list.length?list[this.state.active]:null;

    // list groups
    const present=this.ORDER.filter(ty=>list.some(m=>m.type===ty));
    const groups=present.map(ty=>{ const rows=list.filter(m=>m.type===ty); return { label:this.TYPES[ty].pl, count:String(rows.length), rows:rows.map((m,i)=>({ chip:this.chipEl(m.color,m.type,m.provider,12), chipStyle:'width:40px;height:40px;flex:none;border-radius:11px;background:'+this.rgba(m.color,.18)+';display:flex;align-items:center;justify-content:center;color:'+m.color+';'+(this.useInitials()?'':'padding:10px;'), name:this.composed(m), sub:this.sub(m), isDefault:!!m.isDefault, menuOpen:this.state.menuId===m.id, onMenu:()=>this.toggleMenu(m.id), divider:i<rows.length-1 })) }; });

    const tab=(on)=>'width:34px;height:30px;display:flex;align-items:center;justify-content:center;border:none;border-radius:8px;cursor:pointer;padding:7px;background:'+(on?'#E50914':'transparent')+';color:'+(on?'#fff':'#9898B0')+';';

    return {
      dir, t, isCarousel:style==='carousel', isList:style==='list',
      setCarousel:()=>this.setState({style:'carousel'}), setList:()=>this.setState({style:'list'}), tabCarousel:tab(style==='carousel'), tabList:tab(style==='list'),
      deck, dots, focusIsCard:!!focus, focusName:focus?this.composed(focus):'', focusSub:focus?this.sub(focus):'', focusDefault:focus?!!focus.isDefault:false, canSetDefault:focus?!focus.isDefault:false,
      onSetDefault:()=>{}, onEdit:()=>{}, onDelete:()=>{},
      groups,
      icBack:this.ico('back'), icPlus:this.ico('plus'), icDots:this.ico('dots'), icTrash:this.ico('trash'), icPencil:this.ico('pencil'), icStar:this.fillIco('star'), icCards:this.ico('cards'), icList:this.ico('list'),
      icSignal:this.fillIco('signal'), icWifi:this.ico('wifi'), icBattery:this.ico('battery'),
    };
  }
}
</script>
